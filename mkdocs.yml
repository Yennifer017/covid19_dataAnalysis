site_name: Covid 19 Data Analysis
site_description: Base documental para gobernanza, trazabilidad y despliegue.
site_author: Equipo del proyecto

nav:
  - Inicio: index.md
  - Gobernanza y etica: gobernanza-etica.md
  - Diccionario de datos: diccionario-datos.md
  - Catalogo de metadatos: catalogo-metadatos.md
  - Data lineage: data-lineage.md
  - Entregables: entregables.md

theme:
  name: material
  language: es
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences

plugins:
  - search
  - literate-nav
  - macros
